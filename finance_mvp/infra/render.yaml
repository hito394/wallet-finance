databases:
  - name: ai-finance-assistant-db
    databaseName: wallet
    user: wallet

services:
  - type: web
    name: ai-finance-assistant-api
    runtime: docker
    dockerContext: ./finance_mvp/backend
    dockerfilePath: ./finance_mvp/backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-finance-assistant-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: FILE_STORAGE_ROOT
        value: /app/storage
      - key: MAX_UPLOAD_MB
        value: "25"
      - key: CORS_ORIGINS
        value: '["https://ai-finance-assistant-frontend-hdft.onrender.com","https://ai-finance-assistant-frontend.onrender.com"]'
      - key: TRUSTED_HOSTS
        value: '["ai-finance-assistant-api.onrender.com"]'

  - type: web
    name: ai-finance-assistant-frontend
    runtime: node
    rootDir: finance_mvp/frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://ai-finance-assistant-api.onrender.com/api/v1
      - key: AI_PROXY_ORIGIN
        value: https://ai-finance-assistant-api.onrender.com
