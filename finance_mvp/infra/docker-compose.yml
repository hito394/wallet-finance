version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
      POSTGRES_DB: wallet
    ports:
      - "5432:5432"
    volumes:
      - wallet_finance_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ../backend/app:/app/app
      - ../backend/storage:/app/storage

volumes:
  wallet_finance_pgdata:
